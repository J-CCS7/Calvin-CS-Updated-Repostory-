<!DOCTYPE html>
<html>

<head>
    <title>Kongkow Cafe</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Barlow:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <header class="site-header">
        <div class="hero">
            <div class="hero-content">
                <h1 class="hero-title">Kongkow Cafe</h1>
                <p class="hero-sub">Fresh brews • Cozy vibes • Homemade treats</p>
                <a class="btn primary" href="#menu-grid">See Menu</a>
            </div>
            <!-- decorative coffee cup SVG -->
            <svg class="coffee-svg" width="140" height="140" viewBox="0 0 64 64" fill="none"
                xmlns="http://www.w3.org/2000/svg" aria-hidden>
                <path d="M8 20h36v8a14 14 0 01-14 14H22a14 14 0 01-14-14V20z" fill="#6B4226" />
                <path d="M46 22h6a6 6 0 010 12h-6" stroke="#6B4226" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
                <g class="steam" fill="none" stroke="#d9c6b0" stroke-width="1.6" stroke-linecap="round">
                    <path d="M24 6c1.6 1.6 1.6 4 0 5.6" />
                    <path d="M30 6c1.6 1.6 1.6 4 0 5.6" />
                </g>
            </svg>
        </div>
    </header>

    <div class="content">
        <img src="assets/logo_full.png" alt="Logo" class="logo" />

        <div class="menu-grid" id="menu-grid"></div>
        <div class="footer">
            (c) Kongkow Cafe, 2025
            <button class="checkout" onclick="checkout()">
                Checkout
            </button>
        </div>
    </div>
</body>

<script src="db.js"></script>
<script src="index.js"></script>

</html>
