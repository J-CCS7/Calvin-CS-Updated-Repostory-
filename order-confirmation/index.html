<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KC - Order Confirmation</title>

    <style>
        :root {
            --bg: #f7efe8;
            --panel: #fffaf6;
            --border: #e8d8c7;
            --text: #3c2b24;
            --muted: #7a624f;
            --accent: #7aa874;
            --accent-dark: #5d7f59;
            --gold: #c98f3d;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #f8efe8 0%, #f1e4d7 100%);
            font-family: 'Barlow', Arial, sans-serif;
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 24px;
        }

        .receipt {
            width: min(100%, 380px);
            background: var(--panel);
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 20px 45px rgba(66, 44, 30, 0.16);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .receipt::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top right, rgba(122, 168, 116, 0.15), transparent 32%);
            pointer-events: none;
        }

        .title {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.4px;
            margin-bottom: 4px;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 12px;
            color: var(--muted);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        .date-box {
            text-align: center;
            background: rgba(122, 168, 116, 0.1);
            padding: 10px 12px;
            border-radius: 12px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .line {
            border-top: 1px dashed rgba(92, 67, 49, 0.35);
            margin: 12px 0;
        }

        .payment-section {
            margin: 16px 0;
            text-align: center;
            padding: 14px;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(255, 250, 243, 0.9), rgba(242, 226, 205, 0.9));
            border: 1px solid var(--border);
        }

        .payment-label {
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
        }

        .payment-link {
            display: inline-block;
            margin-bottom: 12px;
            padding: 10px 16px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: white;
            text-decoration: none;
            font-weight: 700;
            box-shadow: 0 8px 18px rgba(93, 127, 89, 0.22);
        }

        .payment-qr {
            width: 160px;
            max-width: 100%;
            margin: 0 auto 10px;
            display: block;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: white;
            padding: 6px;
        }

        .payment-help {
            display: block;
            color: var(--muted);
            font-size: 12px;
            margin-top: 6px;
            line-height: 1.4;
        }

        .item {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(92, 67, 49, 0.1);
        }

        .item:last-child {
            border-bottom: none;
        }

        .item strong {
            color: var(--text);
        }

        .item small {
            color: var(--muted);
            display: block;
            margin-top: 2px;
        }

        .footer {
            text-align: center;
            margin-top: 16px;
            font-size: 12px;
            color: var(--muted);
        }

        .total {
            font-weight: 700;
            margin-top: 12px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(201, 143, 61, 0.12);
            color: var(--text);
            line-height: 1.5;
        }

        .reminder {
            margin-top: 14px;
            padding: 10px 12px;
            border-radius: 12px;
            background: #fff4d6;
            border: 1px solid #e8c86b;
            color: #7a5a00;
            font-size: 12px;
            line-height: 1.4;
            text-align: center;
        }

        .whatsapp-fab {
            position: fixed;
            right: 20px;
            bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 999px;
            border: none;
            text-decoration: none;
            color: white;
            font-weight: 700;
            font-size: 14px;
            background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
            box-shadow: 0 10px 24px rgba(18, 140, 126, 0.35);
            z-index: 1000;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .whatsapp-fab:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 14px 28px rgba(18, 140, 126, 0.4);
        }

        .whatsapp-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            font-size: 16px;
        }

        @media (max-width: 480px) {
            body { padding: 12px; }
            .receipt { padding: 18px; }
            .whatsapp-fab {
                right: 14px;
                bottom: 14px;
                padding: 10px 14px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>

    <div class="receipt">
        <div class="title">Kongkow Cafe</div>
        <div class="subtitle">Order Confirmation</div>

        <div id="date" class="date-box"></div>

        <div class="line"></div>

        <div id="cart"></div>

        <div class="line"></div>

        <div class="payment-section" id="paymentSection">
            <div class="payment-label">Ready to pay?</div>
            <a id="paymentLink" class="payment-link" href="#" target="_blank">Open payment page</a>
            <img id="paymentQr" class="payment-qr" alt="Payment QR code" src="../assets/My First Qr Code With The Link.png" />
            <small class="payment-help">Scan Qr code or click the link to open the bank transfer page and complete your payment.</small>
        </div>

        <div class="total" id="totalItem"></div>

        <div class="reminder">
            Please don’t forget to send your order lists by clicking the "Send Order" button.
        </div>

        <div class="footer">
            Thank You For Shopping At Kongkow Cafe ❤️
        </div>
    </div>

    <a id="whatsappButton" class="whatsapp-fab" href="#" target="_blank" rel="noopener noreferrer" aria-label="Send this order to WhatsApp">
        <span class="whatsapp-icon">💬</span>
        <span>Send order</span>
    </a>

    <script src="../db.js"></script>
    <script src="index.js"></script>

</body>

</html>
