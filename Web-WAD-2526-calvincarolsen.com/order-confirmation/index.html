<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KC - Order Confirmation</title>

    <style>
        body {
            background: #ececec;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        .receipt {
            width: 320px;
            background: white;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.15);
            border-radius: 10px;
            font-family: "Courier New", monospace;
        }

        .title {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 10px;
            color: gray;
        }

        .line {
            border-top: 1px dashed black;
            margin: 10px 0;
        }

        .item {
            display: flex;
            justify-content: space-between;
            margin: 6px 0;
        }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: gray;
        }

        .total {
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="receipt">
        <div class="title">Kongkow Cafe</div>
        <div class="subtitle">Order Confirmation</div>

        <div id="date"></div>

        <div class="line"></div>

        <div id="cart"></div>

        <div class="line"></div>

        <div class="total" id="totalItem"></div>

        <div class="footer">
            Thank You For Shopping At Kongkow Cafe ❤️
        </div>
    </div>

    <script src="../db.js"></script>
    <script src="index.js"></script>

</body>

</html>
